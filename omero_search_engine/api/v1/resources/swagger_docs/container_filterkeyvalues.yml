An endpoint that returns the list of available buckets along with the number of images contained in each one for a specific container.
In this endpoint the search will use the provided query results within the specified container and provide the available values for the specified key.

This is a sample query to be used to explore this endpoint

  {
    "resource": "image",
      "query_details": {
        "and_filters": [
          {
            "name": "Organism",
            "value": "homo sapiens",
            "operator": "equals",
            "resource": "image"
          },
          {
            "name": "Organism part",
            "value": "Brain",
            "operator": "equals",
            "resource": "image"
          }
        ],
        "or_filters": [

        ],
        "case_sensitive": false
      }
    }

The user needs to specify
- the container name, e.g. "idr0043-uhlen-humanproteinatlas/experimentA"
- the key, e.g. "Gene Symbol"

The results should contain buckets like this:
{
        "key": "Gene symbol",
        "no_image": 146,
        "value": "NBPF12"
}

---
tags:
 - Return available key values with a search result for a specific container
parameters:
  - name: resource_table
    in: path
    type: string
    enum: ['image', 'project', 'screen', 'well', 'plate']
    required: true
    default: 'image'
  - name: data
    in: body
    required: false
  - name: container_name
    in: query
    type: string
    required: true

  - name: key
    in: query
    type: string
    required: true

  - name: data_source
    in: query
    type: string
    required: false
    description: If a specific data source is provided, results will be retrieved from that source. Otherwise, the default data source will be used. If there is no default data source configured, results will be gathered from all available sources.

responses:
  200:
    description: A JSON contains the results
    examples:
      results: []
