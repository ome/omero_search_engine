An endpoint to return JSON file or the BioFile Finder (BFF) CSV or Parquet file for a container
BFF is a tool for filtering, sorting and grouping tabular data.
---
tags:
  - JSON file or CSV/Parquet file formatted in BFF for a container
parameters:
  - name: container_name
    description: The container name
    in: query
    type: string
    required: true
  - name: container_type
    description: The container type (project or screen)
    in: query
    type: string
    required: true
  - name: data_source
    description: Data source
    in: query
    type: string
    required: false
  - name: file_type
    description: file typee (json, csv or parquet)
    in: query
    type: string
    required: true

responses:
  200:
    description: Returns the file in the format specified by the request.
