A searchengine endpoint to return the available containers and the number of images in each.
---
tags:
  - Containers and the number of images in each container
parameters:
  - name: data_source
    in: query
    type: string
    required: false
    description:  If data source is specified in the request, it will be used. Otherwise, the default data source will be used. If no default data source is configured, results from all available data sources will be returned.

responses:
  200:
    description: A JSON containing the search results
    examples:
      results: []
